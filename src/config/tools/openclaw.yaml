name: OpenClaw
category: AI Coding

description: 通用 AI Agent 运行时框架，支持多种 AI 适配器和工具编排
homepage: https://openclaw.ai

install:
  darwin: bash -c 'set -e; if command -v curl >/dev/null 2>&1; then curl -fsSL https://openclaw.ai/install.sh | bash; elif command -v npm >/dev/null 2>&1; then npm install -g openclaw@latest; else echo "缺少 curl/npm，无法安装 OpenClaw"; exit 1; fi'
  linux: bash -c 'set -e; if command -v curl >/dev/null 2>&1; then curl -fsSL https://openclaw.ai/install.sh | bash; elif command -v npm >/dev/null 2>&1; then npm install -g openclaw@latest; else echo "缺少 curl/npm，无法安装 OpenClaw"; exit 1; fi'
upgrade:
  darwin: bash -c 'set -e; if command -v npm >/dev/null 2>&1; then npm update -g openclaw@latest; elif command -v curl >/dev/null 2>&1; then curl -fsSL https://openclaw.ai/install.sh | bash; else echo "缺少 curl/npm，无法升级 OpenClaw"; exit 1; fi'
  linux: bash -c 'set -e; if command -v npm >/dev/null 2>&1; then npm update -g openclaw@latest; elif command -v curl >/dev/null 2>&1; then curl -fsSL https://openclaw.ai/install.sh | bash; else echo "缺少 curl/npm，无法升级 OpenClaw"; exit 1; fi'
uninstall:
  darwin: bash -c 'if command -v openclaw >/dev/null 2>&1; then openclaw uninstall; elif command -v npm >/dev/null 2>&1; then npm uninstall -g openclaw; else echo "请手动移除 OpenClaw"; fi'
  linux: bash -c 'if command -v openclaw >/dev/null 2>&1; then openclaw uninstall; elif command -v npm >/dev/null 2>&1; then npm uninstall -g openclaw; else echo "请手动移除 OpenClaw"; fi'
check:
  darwin: command -v openclaw
  linux: command -v openclaw

dependencies:
  - Homebrew

skill: "通用 AI Agent 运行时框架。支持加载多种 AI 适配器（Claude、OpenAI、Gemini 等），提供统一的工具调用和任务编排能力。适合构建跨模型、跨平台的 AI 自动化工作流。"

detail: |
  ## 什么是 OpenClaw

  OpenClaw 是一个通用的 AI Agent 运行时框架，支持加载多种 AI 适配器（Claude、OpenAI、Gemini 等），提供统一的工具调用和任务编排能力。它让开发者能够构建跨模型、跨平台的 AI 自动化工作流，无需为每个模型单独编写集成代码。

  ## 核心功能

  - **多模型适配**：统一接口支持 Claude、OpenAI、Gemini 等多种 AI 模型
  - **工具调用**：标准化的工具定义和调用协议，支持自定义工具
  - **任务编排**：复杂工作流的定义、调度和执行
  - **会话管理**：支持多轮对话和上下文持久化
  - **插件系统**：通过插件扩展 Agent 的能力和工具集
  - **跨平台运行**：支持 macOS、Linux 等多平台运行

  ## 使用方式

  macOS 和 Linux 上均为命令行工具，运行 `openclaw` 启动交互式会话。
