name: Ollama
category: AI Coding

description: 本地大模型运行平台，支持拉取和运行 llama3、qwen2 等开源模型
description_en: Local LLM runtime platform for pulling and running open-source models like llama3 and qwen2
homepage: https://ollama.com

install:
  darwin: brew install --cask ollama
  linux: curl -fsSL https://ollama.com/install.sh | sh
upgrade:
  darwin: brew upgrade --cask ollama
  linux: curl -fsSL https://ollama.com/install.sh | sh
uninstall:
  darwin: brew uninstall --cask ollama
  linux: sudo rm -f /usr/local/bin/ollama
check: command -v ollama
versionCmd: ollama --version 2>/dev/null

dependencies:
  - Homebrew

skill: "本地大模型运行平台。用 ollama pull <model> 拉取模型（如 llama3、qwen2、codellama），ollama run <model> 启动交互式对话，ollama list 查看已下载模型。支持通过 API（默认 localhost:11434）集成到应用中。无需 API Key，完全本地运行。"

detail: |
  ## 什么是 Ollama

  Ollama 是一个本地大语言模型运行平台，让你在本地机器上一键运行 llama3、qwen2、codellama 等开源大模型。它无需 API Key，完全本地运行，数据不出本地，是隐私敏感场景和离线环境的理想选择。

  ## 核心功能

  - **一键运行模型**：`ollama run llama3` 即可启动模型对话，无需复杂配置
  - **模型库**：提供丰富的开源模型，涵盖对话、代码、嵌入等多种类型
  - **REST API**：默认监听 localhost:11434，提供兼容 OpenAI 的 API 接口
  - **Modelfile**：支持自定义模型参数、系统提示词和量化设置
  - **多模态支持**：支持 LLaVA 等视觉语言模型，处理图片输入
  - **模型管理**：拉取、删除、列表管理本地模型

  ## 常用命令

  ```bash
  ollama pull llama3           # 下载 llama3 模型
  ollama run llama3            # 启动 llama3 对话
  ollama run qwen2             # 启动 qwen2 对话
  ollama list                  # 列出已下载的模型
  ollama rm llama3             # 删除模型
  ollama create mymodel -f Modelfile  # 从 Modelfile 创建自定义模型
  ollama serve                 # 启动 API 服务
  ```

detail_en: |
  ## What is Ollama

  Ollama is a local large language model runtime platform that lets you run open-source LLMs like llama3, qwen2, and codellama on your local machine with a single command. It requires no API key, runs entirely locally, and keeps data on your machine — making it ideal for privacy-sensitive scenarios and offline environments.

  ## Key Features

  - **One-command Models**: `ollama run llama3` starts a model conversation without complex configuration
  - **Model Library**: Rich collection of open-source models covering conversation, code, embeddings, and more
  - **REST API**: Listens on localhost:11434 by default, providing an OpenAI-compatible API interface
  - **Modelfile**: Supports custom model parameters, system prompts, and quantization settings
  - **Multimodal Support**: Supports visual language models like LLaVA for image input
  - **Model Management**: Pull, delete, and list local models

  ## Common Commands

  ```bash
  ollama pull llama3           # Download the llama3 model
  ollama run llama3            # Start a llama3 conversation
  ollama run qwen2             # Start a qwen2 conversation
  ollama list                  # List downloaded models
  ollama rm llama3             # Delete a model
  ollama create mymodel -f Modelfile  # Create a custom model from a Modelfile
  ollama serve                 # Start the API server
  ```
