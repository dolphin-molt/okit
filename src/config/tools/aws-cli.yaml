name: AWS CLI
category: Cloud

description: Amazon Web Services 官方命令行工具，管理 EC2、S3、Lambda 等云服务
description_en: Official AWS command-line tool for managing EC2, S3, Lambda and other cloud services
homepage: https://aws.amazon.com/cli

install:
  darwin: brew install awscli
  linux: curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip && unzip -o /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install && rm -rf /tmp/awscliv2.zip /tmp/aws
upgrade:
  darwin: brew upgrade awscli
  linux: curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip && unzip -o /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install --update && rm -rf /tmp/awscliv2.zip /tmp/aws
uninstall:
  darwin: brew uninstall awscli
  linux: sudo rm -rf /usr/local/aws-cli /usr/local/bin/aws /usr/local/bin/aws_completer
check: command -v aws
versionCmd: aws --version 2>&1 | head -1
authCheck: "aws sts get-caller-identity 2>&1"
authFix: "aws configure"

dependencies:
  - Homebrew

detail: |
  ## 什么是 AWS CLI

  AWS CLI 是 Amazon Web Services 的统一命令行工具，提供了对 AWS 所有服务的编程式访问能力。通过简洁的命令语法，开发者可以在终端中管理 EC2 虚拟机、S3 存储、Lambda 函数、DynamoDB 数据库等数百种云服务，是 AWS 云运维和自动化的必备工具。

  ## 核心功能

  - **统一接口**：一个命令行工具管理所有 AWS 服务，无需切换控制台
  - **脚本自动化**：支持 Shell 脚本批量操作，适合 CI/CD 和自动化运维
  - **多配置文件**：支持多个 AWS 账号和区域的配置切换
  - **JSON 输出**：结构化输出便于与 jq 等工具配合进行数据过滤
  - **S3 文件操作**：高效的上传、下载、同步和权限管理
  - **IAM 管理**：用户、角色、策略的创建和权限控制

  ## 常用命令

  ```bash
  aws configure              # 配置 AWS 凭据和区域
  aws s3 ls                  # 列出 S3 存储桶
  aws s3 cp file.txt s3://bucket/  # 上传文件到 S3
  aws ec2 describe-instances # 查看 EC2 实例列表
  aws lambda invoke --function-name my-func output.json  # 调用 Lambda 函数
  aws sts get-caller-identity # 查看当前身份信息
  aws iam list-users         # 列出 IAM 用户
  ```

detail_en: |
  ## What is AWS CLI

  AWS CLI is the unified command-line tool for Amazon Web Services, providing programmatic access to all AWS services. With concise command syntax, developers can manage EC2 instances, S3 storage, Lambda functions, DynamoDB databases, and hundreds of other cloud services from the terminal. It is an essential tool for AWS cloud operations and automation.

  ## Key Features

  - **Unified Interface**: Manage all AWS services with a single CLI tool, no need to switch between consoles
  - **Script Automation**: Supports Shell scripting for batch operations, ideal for CI/CD and automated operations
  - **Multiple Profiles**: Supports switching between multiple AWS accounts and regions
  - **JSON Output**: Structured output works seamlessly with tools like jq for data filtering
  - **S3 File Operations**: Efficient upload, download, sync, and permission management
  - **IAM Management**: User, role, and policy creation with access control

  ## Common Commands

  ```bash
  aws configure              # Configure AWS credentials and region
  aws s3 ls                  # List S3 buckets
  aws s3 cp file.txt s3://bucket/  # Upload file to S3
  aws ec2 describe-instances # List EC2 instances
  aws lambda invoke --function-name my-func output.json  # Invoke Lambda function
  aws sts get-caller-identity # View current identity info
  aws iam list-users         # List IAM users
  ```
