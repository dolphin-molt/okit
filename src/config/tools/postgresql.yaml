name: PostgreSQL
category: Database

description: 功能强大的开源关系数据库，支持 JSON、全文搜索等高级特性
description_en: Powerful open-source relational database supporting JSON, full-text search, and advanced features
homepage: https://postgresql.org

install:
  darwin: brew install postgresql@16
  linux: sudo apt-get update && sudo apt-get install -y postgresql-client
upgrade:
  darwin: brew upgrade postgresql@16
  linux: sudo apt-get update && sudo apt-get install -y postgresql-client
uninstall:
  darwin: brew uninstall postgresql@16
  linux: sudo apt-get remove -y postgresql-client
check: command -v psql
versionCmd: psql --version

dependencies:
  - Homebrew

detail: |
  ## 什么是 PostgreSQL

  PostgreSQL 是世界上最先进的开源关系数据库管理系统，以功能丰富、标准兼容和高扩展性著称。它支持 JSON/JSONB、全文搜索、地理空间数据（PostGIS）、窗口函数等高级特性，被广泛应用于各种规模的应用系统。

  ## 核心功能

  - **SQL 标准兼容**：高度兼容 SQL 标准，支持复杂查询、CTE、窗口函数等
  - **JSON 支持**：原生 JSON/JSONB 类型，可替代 MongoDB 处理文档数据
  - **全文搜索**：内置全文搜索引擎，支持中文分词（需安装扩展）
  - **扩展生态**：通过 Extension 机制扩展功能，如 PostGIS（地理信息）、pg_trgm（模糊搜索）
  - **MVCC 并发**：多版本并发控制，读写操作互不阻塞
  - **高可用方案**：支持流复制、逻辑复制和多种高可用集群方案

  ## 常用命令

  ```bash
  psql -h localhost -U postgres # 连接数据库
  psql -d mydb -f schema.sql    # 执行 SQL 文件
  pg_dump mydb > backup.sql     # 备份数据库
  pg_restore -d mydb backup.sql # 恢复数据库
  psql -c "SELECT version();"   # 执行单条 SQL
  createdb mydb                 # 创建数据库
  dropdb mydb                   # 删除数据库
  psql -l                       # 列出所有数据库
  ```

detail_en: |
  ## What is PostgreSQL

  PostgreSQL is the world's most advanced open-source relational database management system, known for its rich feature set, standards compliance, and high extensibility. It supports JSON/JSONB, full-text search, geospatial data (PostGIS), window functions, and other advanced features, and is widely used in applications of all sizes.

  ## Key Features

  - **SQL Standards Compliance**: Highly compliant with SQL standards, supporting complex queries, CTEs, window functions, and more
  - **JSON Support**: Native JSON/JSONB types, can replace MongoDB for document data
  - **Full-text Search**: Built-in full-text search engine with Chinese word segmentation support (via extension)
  - **Extension Ecosystem**: Extend functionality through extensions like PostGIS (geospatial), pg_trgm (fuzzy search)
  - **MVCC Concurrency**: Multi-version concurrency control with non-blocking read/write operations
  - **High Availability**: Supports streaming replication, logical replication, and various HA cluster solutions

  ## Common Commands

  ```bash
  psql -h localhost -U postgres # Connect to database
  psql -d mydb -f schema.sql    # Execute SQL file
  pg_dump mydb > backup.sql     # Backup database
  pg_restore -d mydb backup.sql # Restore database
  psql -c "SELECT version();"   # Execute a single SQL statement
  createdb mydb                 # Create database
  dropdb mydb                   # Drop database
  psql -l                       # List all databases
  ```
