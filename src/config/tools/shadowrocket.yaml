name: Shadowrocket
category: Network
type: app

description: iOS/macOS 平台的网络代理客户端，支持 SS、VMess、Trojan 等多种协议
homepage: https://apps.apple.com/app/shadowrocket/id6606638066
downloadUrl: https://apps.apple.com/app/shadowrocket/id6606638066

install:
  darwin: mas install 6606638066
upgrade:
  darwin: mas upgrade 6606638066
uninstall:
  darwin: bash -c '[ -d "/Applications/Shadowrocket.app" ] && osascript -e "tell application \"Finder\" to delete POSIX file \"/Applications/Shadowrocket.app\""'
check:
  darwin: test -d "/Applications/Shadowrocket.app"

dependencies:
  - mas

detail: |
  ## 什么是 Shadowrocket

  Shadowrocket 是 iOS/macOS 平台上广受好评的网络代理客户端，支持 Shadowsocks、VMess、VLESS、Trojan、Hysteria 等多种代理协议。它提供规则分流、URL 重写、脚本注入等高级功能，是开发者和隐私用户的常用工具。

  ## 核心功能

  - **多协议支持**：SS、VMess、VLESS、Trojan、Hysteria2、TUIC 等主流协议
  - **规则分流**：基于域名、IP、地理位置的智能分流规则
  - **URL 重写**：支持 URL Rewrite、Header Rewrite、Map Local 等
  - **脚本功能**：支持 JavaScript 脚本进行请求/响应处理
  - **MitM 解密**：HTTPS 解密用于调试和分析
  - **订阅管理**：支持订阅链接自动更新节点
  - **全局/规则模式**：灵活切换代理模式

  ## 使用方式

  Shadowrocket 为 App Store 应用。安装后打开，添加服务器节点或导入订阅链接即可使用。需要通过 mas（Mac App Store CLI）进行安装。
