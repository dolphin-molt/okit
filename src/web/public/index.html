<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=2.1.9">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-shape"></div>
      <span class="brand-text">OKIT</span>
      <span class="brand-hand">工具箱</span>
    </div>
    <div class="sidebar-cut"></div>
    <ul class="nav-links">
      <li class="nav-item active" data-tab="tools" onclick="switchTab('tools')">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
          <rect x="11" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="1" y="11" width="6" height="6" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor" opacity="0.3"/>
        </svg>
        <span>工具列表</span>
      </li>
      <li class="nav-item" data-tab="vault" onclick="switchTab('vault')">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="7" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M5 7V5a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <circle cx="9" cy="12" r="1.5" fill="currentColor"/>
        </svg>
        <span>密钥管理</span>
      </li>
      <li class="nav-item" data-tab="auth" onclick="switchTab('auth')">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" fill="none">
          <circle cx="9" cy="9" r="7"/>
          <path d="M9 6v3.5l2.5 1.5" stroke-linecap="round" stroke="currentColor"/>
          <circle cx="9" cy="9" r="1" fill="currentColor"/>
        </svg>
        <span>授权管理</span>
      </li>
      <li class="nav-item" data-tab="logs" onclick="switchTab('logs')">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M3 3h12v12H3z" stroke-linejoin="round"/>
          <path d="M6 6h6M6 9h4M6 12h5"/>
        </svg>
        <span>操作日志</span>
      </li>
    </ul>
    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="9" cy="9" r="3.5"/>
          <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.7 3.7l1.4 1.4M12.9 12.9l1.4 1.4M3.7 14.3l1.4-1.4M12.9 5.1l1.4-1.4"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M15 10.3A6.5 6.5 0 0 1 7.7 3 6.5 6.5 0 1 0 15 10.3z"/>
        </svg>
      </button>
      <span class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">连接中</span>
      </span>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">

    <!-- ═══ Tools Tab ═══ -->
    <div id="tab-tools" class="tab-content">
      <header class="page-header">
        <div class="header-paper">
          <h1 class="page-title">工具管理</h1>
          <p class="page-subtitle">查看所有开发工具的安装与授权状态</p>
        </div>
        <button class="btn-refresh" onclick="refreshTools()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 7A5 5 0 1 1 7 2c1.4 0 2.6.6 3.5 1.5"/>
            <path d="M12 2v3h-3"/>
          </svg>
          刷新
        </button>
      </header>

      <div class="summary">
        <div class="summary-card" style="--card-bg: #fef3c7; --card-rotate: -1.2deg; --card-shadow: #f59e0b">
          <span class="summary-num" id="summaryInstalled">—</span>
          <span class="summary-label">已安装</span>
        </div>
        <div class="summary-card" style="--card-bg: #dbeafe; --card-rotate: 0.8deg; --card-shadow: #3b82f6">
          <span class="summary-num" id="summaryTotal">—</span>
          <span class="summary-label">总计</span>
        </div>
        <div class="summary-card" id="summaryAuthWrap" style="display:none; --card-bg: #fee2e2; --card-rotate: -0.5deg; --card-shadow: #ef4444">
          <span class="summary-num" id="summaryAuth">0</span>
          <span class="summary-label">未授权</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-paper">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
            <circle cx="7" cy="7" r="5"/>
            <path d="M11 11l3.5 3.5"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索工具..." oninput="handleSearch(this.value)">
        </div>
        <div class="filter-paper">
          <select id="categoryFilter" class="filter-select" onchange="handleFilter(this.value)">
            <option value="all">全部分类</option>
          </select>
        </div>
      </div>

      <div class="filter-bar">
        <div class="status-filters">
          <button class="status-filter active" data-status="all" onclick="handleStatusFilter('all')">全部</button>
          <button class="status-filter" data-status="installed" onclick="handleStatusFilter('installed')">已安装</button>
          <button class="status-filter" data-status="missing" onclick="handleStatusFilter('missing')">未安装</button>
          <button class="status-filter" data-status="unauthorized" onclick="handleStatusFilter('unauthorized')">未授权</button>
        </div>
        <button class="btn-select-all" onclick="selectAll()">全选</button>
      </div>

      <div class="tool-list" id="toolList">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          正在检查工具状态...
        </div>
      </div>

      <div id="batchBar" class="batch-bar" style="display:none">
        <div class="batch-bar-inner">
          <span class="batch-info">已选 <strong id="batchCount">0</strong> 项</span>
          <button class="btn-batch btn-batch--install" onclick="batchAction('install')">批量安装</button>
          <button class="btn-batch btn-batch--upgrade" onclick="batchAction('upgrade')">批量升级</button>
          <button class="btn-batch btn-batch--uninstall" onclick="batchAction('uninstall')">批量卸载</button>
          <button class="btn-batch-cancel" onclick="clearSelection()">取消</button>
        </div>
      </div>
    </div>

    <!-- ═══ Vault Tab ═══ -->
    <div id="tab-vault" class="tab-content" style="display:none">
      <header class="page-header">
        <div class="header-paper" style="transform: rotate(0.3deg)">
          <h1 class="page-title">密钥管理</h1>
          <p class="page-subtitle">管理 API 密钥、Token 等敏感凭证</p>
        </div>
        <div class="header-actions">
          <button class="btn-add" onclick="showVaultForm()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M7 2v10M2 7h10"/>
            </svg>
            添加密钥
          </button>
          <button class="btn-outline" onclick="exportVault()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M2 10v2h10v-2M7 2v7M4 6l3 3 3-3"/>
            </svg>
            导出
          </button>
          <button class="btn-outline" onclick="triggerImportVault()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M2 4v-2h10v2M7 12V5M4 8l3-3 3 3"/>
            </svg>
            导入
          </button>
          <input type="file" id="vaultImportFile" accept=".json" style="display:none" onchange="handleImportVault(this)">
          <button class="btn-refresh" onclick="loadVault()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M12 7A5 5 0 1 1 7 2c1.4 0 2.6.6 3.5 1.5"/>
              <path d="M12 2v3h-3"/>
            </svg>
            刷新
          </button>
        </div>
      </header>

      <div id="vaultForm" class="vault-form" style="display:none">
        <div class="vault-form-inner">
          <h3 class="vault-form-title" id="vaultFormTitle">添加密钥</h3>
          <div class="vault-form-row">
            <div class="vault-form-field">
              <label>Key</label>
              <input type="text" id="vaultKey" class="vault-input" placeholder="例如 OPENAI_API_KEY">
            </div>
            <div class="vault-form-field vault-form-field--alias">
              <label>别名</label>
              <input type="text" id="vaultAlias" class="vault-input" placeholder="default">
            </div>
          </div>
          <div class="vault-form-field">
            <label>Value</label>
            <input type="password" id="vaultValue" class="vault-input" placeholder="密钥值">
            <button type="button" class="btn-toggle-vis" onclick="toggleValueVis()">显示</button>
          </div>
          <div class="vault-form-actions">
            <button class="btn-save" onclick="saveVault()">保存</button>
            <button class="btn-cancel" onclick="hideVaultForm()">取消</button>
          </div>
        </div>
      </div>

      <div class="vault-list" id="vaultList">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          加载中...
        </div>
      </div>
    </div>

    <!-- ═══ Logs Tab ═══ -->
    <div id="tab-logs" class="tab-content" style="display:none">
      <header class="page-header">
        <div class="header-paper" style="transform: rotate(-0.3deg)">
          <h1 class="page-title">操作日志</h1>
          <p class="page-subtitle">工具安装、升级、卸载的历史记录</p>
        </div>
        <button class="btn-refresh" onclick="loadLogs()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 7A5 5 0 1 1 7 2c1.4 0 2.6.6 3.5 1.5"/>
            <path d="M12 2v3h-3"/>
          </svg>
          刷新
        </button>
      </header>
      <div class="log-list" id="logList">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          加载中...
        </div>
      </div>
    </div>

    <!-- ═══ Auth Tab ═══ -->
    <div id="tab-auth" class="tab-content" style="display:none">
      <header class="page-header">
        <div class="header-paper" style="transform: rotate(0.2deg)">
          <h1 class="page-title">授权管理</h1>
          <p class="page-subtitle">查看工具授权状态，一键执行授权操作</p>
        </div>
        <button class="btn-refresh" onclick="loadAuth()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 7A5 5 0 1 1 7 2c1.4 0 2.6.6 3.5 1.5"/>
            <path d="M12 2v3h-3"/>
          </svg>
          刷新
        </button>
      </header>
      <div class="auth-summary" id="authSummary"></div>
      <div class="auth-list" id="authList">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          加载中...
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Progress Modal -->
<div id="progressModal" class="progress-modal" style="display:none">
  <div class="progress-panel">
    <div class="progress-header">
      <span id="progressTitle" class="progress-title">正在安装...</span>
      <button class="progress-close" onclick="closeProgress()">&times;</button>
    </div>
    <pre class="progress-output" id="progressOutput"></pre>
    <div class="progress-footer" id="progressFooter">
      <div class="progress-spinner"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- Auth Dialog -->
<div id="authDialog" class="auth-overlay" style="display:none">
  <div class="auth-panel">
    <div class="progress-header">
      <span id="authDialogTitle" class="progress-title">授权</span>
      <button class="progress-close" onclick="closeAuthDialog()">&times;</button>
    </div>
    <div class="auth-body" id="authDialogBody"></div>
    <div class="auth-footer" id="authDialogFooter">
      <button class="auth-btn-cancel" onclick="closeAuthDialog()">取消</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/app.js?v=2.1.9"></script>
</body>
</html>
