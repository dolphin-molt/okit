name: Warp
category: Terminals
type: app

description: 基于 Rust 的现代终端，内置 AI 命令补全和协作功能
description_en: Modern Rust-based terminal with built-in AI command completion and collaboration features
homepage: https://warp.dev
downloadUrl: https://www.warp.dev

install:
  darwin: brew install --cask warp
upgrade:
  darwin: brew upgrade --cask warp
uninstall:
  darwin: bash -c 'brew uninstall --cask warp 2>/dev/null; [ -d /Applications/Warp.app ] && osascript -e "tell application \"Finder\" to delete POSIX file \"/Applications/Warp.app\""'
check:
  darwin: test -d /Applications/Warp.app

dependencies:
  - Homebrew

detail: |
  ## 什么是 Warp

  Warp 是一款基于 Rust 构建的现代化终端模拟器，内置 AI 命令补全和团队协作功能。它将 IDE 的编辑体验带入终端，支持命令编辑、输出分组、工作流共享等创新功能，旨在重新定义终端使用体验。

  ## 核心功能

  - **AI 命令补全**：内置 AI 助手，根据自然语言描述生成命令
  - **命令编辑**：像编辑器一样编辑命令，支持光标移动和选择
  - **输出分组**：命令和输出成组展示，便于回溯和搜索
  - **工作流共享**：将常用命令序列保存为可复用的工作流
  - **协作功能**：支持团队成员共享命令和工作流
  - **现代 UI**：现代化的界面设计，支持主题和自定义

  ## 常用命令

  ```bash
  # Warp 为 GUI 应用，通过界面交互使用：
  # Ctrl+Shift+I    # 唤起 AI 命令补全
  # 输入自然语言描述，Warp AI 自动生成对应命令
  # 命令输出自动分组，方便浏览历史
  # 支持通过 Warp Dashboard 管理工作流
  open -a Warp                    # 打开 Warp 终端
  ```

detail_en: |
  ## What is Warp

  Warp is a modern terminal emulator built with Rust, featuring built-in AI command completion and team collaboration. It brings the IDE editing experience to the terminal, supporting command editing, output grouping, workflow sharing, and other innovative features, aiming to redefine the terminal experience.

  ## Key Features

  - **AI command completion**: Built-in AI assistant generates commands from natural language descriptions
  - **Command editing**: Edit commands like in an editor, with cursor movement and selection support
  - **Output grouping**: Commands and outputs are grouped for easy review and searching
  - **Workflow sharing**: Save common command sequences as reusable workflows
  - **Collaboration**: Share commands and workflows with team members
  - **Modern UI**: Modern interface design with theme and customization support

  ## Common Commands

  ```bash
  # Warp is a GUI application, used through the interface:
  # Ctrl+Shift+I    # Invoke AI command completion
  # Type a natural language description, Warp AI automatically generates the corresponding command
  # Command outputs are automatically grouped for easy history browsing
  # Manage workflows through the Warp Dashboard
  open -a Warp                    # Open Warp terminal
  ```
