name: Node.js
category: Development

description: 基于 Chrome V8 引擎的 JavaScript 运行时，用于构建服务端和网络应用
description_en: JavaScript runtime built on Chrome V8 engine for building server-side and network applications
homepage: https://nodejs.org

install:
  darwin: brew install node
  linux: "curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash - && sudo apt-get install -y nodejs"
upgrade:
  darwin: brew upgrade node
  linux: "sudo apt-get update && sudo apt-get install -y nodejs"
uninstall:
  darwin: brew uninstall node
  linux: "sudo apt-get remove -y nodejs"
check: command -v node
versionCmd: node --version
authCheck: "npm whoami 2>&1"
authFix: "sh -c 'TOKEN=$(okit vault get NPM_OKIT_TOKEN 2>/dev/null || okit vault get NPM_TOKEN 2>/dev/null || okit vault get NPM_ACCESS_TOKEN 2>/dev/null || true); if [ -n \"$TOKEN\" ]; then npm config set //registry.npmjs.org/:_authToken \"$TOKEN\"; else npm login; fi'"

authMethods:
  - name: Access Token (推荐)
    description: 从 npm Access Tokens 生成 Automation token，粘贴后写入本机 npm 配置
    tokenUrl: https://www.npmjs.com/settings/cing-self/tokens
    tokenHint: 选择 Generate New Token → Automation，复制生成的 token
    command: "npm config set //registry.npmjs.org/:_authToken '{token}'"
    recommended: true
  - name: OKIT Vault
    description: 使用 OKIT Vault 中的 NPM_OKIT_TOKEN、NPM_TOKEN 或 NPM_ACCESS_TOKEN 自动配置 npm 发布授权
    command: "sh -c 'TOKEN=$(okit vault get NPM_OKIT_TOKEN 2>/dev/null || okit vault get NPM_TOKEN 2>/dev/null || okit vault get NPM_ACCESS_TOKEN 2>/dev/null); npm config set //registry.npmjs.org/:_authToken \"$TOKEN\"'"
  - name: npm login
    description: 使用 npm 官方交互式登录流程
    command: npm login

dependencies:
  - Homebrew

detail: |
  ## 什么是 Node.js

  Node.js 是一个基于 Chrome V8 引擎的 JavaScript 运行时环境，让 JavaScript 可以在服务器端运行。它采用事件驱动、非阻塞 I/O 模型，非常适合构建高性能、可扩展的网络应用。

  ## 核心功能

  - **服务端 JavaScript**：让 JS 脱离浏览器运行，用于构建后端服务和 API
  - **npm 生态**：内置 npm 包管理器，拥有超过 200 万个开源包
  - **非阻塞 I/O**：事件驱动架构，擅长处理高并发 I/O 密集型任务
  - **全栈统一**：前后端使用同一种语言，降低开发复杂度
  - **跨平台**：支持 macOS、Linux、Windows 等多个操作系统
  - **LTS 版本**：提供长期支持版本，保障生产环境稳定性

  ## 常用命令

  ```bash
  node --version             # 查看版本
  node app.js                # 运行 JS 文件
  node -e "console.log('hi')" # 执行单行代码
  npm init                   # 初始化项目
  npm install <package>      # 安装依赖包
  npm run <script>           # 运行 package.json 中的脚本
  npx <command>              # 执行 npm 包中的命令
  npm whoami                 # 检查 npm Registry 授权
  npm publish --access public # 发布公开 scoped 包
  ```

detail_en: |
  ## What is Node.js

  Node.js is a JavaScript runtime built on Chrome's V8 engine that enables JavaScript to run on the server side. It uses an event-driven, non-blocking I/O model, making it well-suited for building high-performance, scalable network applications.

  ## Key Features

  - **Server-side JavaScript**: Run JS outside the browser for building backend services and APIs
  - **npm Ecosystem**: Built-in npm package manager with over 2 million open-source packages
  - **Non-blocking I/O**: Event-driven architecture, excels at handling high-concurrency I/O-intensive tasks
  - **Full-stack Unification**: Use the same language for both frontend and backend, reducing complexity
  - **Cross-platform**: Supports macOS, Linux, Windows, and other operating systems
  - **LTS Releases**: Long-term support versions ensure production environment stability

  ## Common Commands

  ```bash
  node --version             # Check version
  node app.js                # Run a JS file
  node -e "console.log('hi')" # Execute a one-liner
  npm init                   # Initialize a project
  npm install <package>      # Install a dependency
  npm run <script>           # Run a script from package.json
  npx <command>              # Execute a command from an npm package
  npm whoami                 # Check npm Registry auth
  npm publish --access public # Publish a public scoped package
  ```
