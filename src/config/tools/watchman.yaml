name: watchman
category: Development

description: Facebook 出品的文件监控服务，监视文件变更并触发操作
description_en: Facebook's file watching service that monitors file changes and triggers actions
homepage: https://facebook.github.io/watchman

install:
  darwin: brew install watchman
  linux: sudo apt-get update && sudo apt-get install -y watchman
upgrade:
  darwin: brew upgrade watchman
  linux: sudo apt-get update && sudo apt-get install -y watchman
uninstall:
  darwin: brew uninstall watchman
  linux: sudo apt-get remove -y watchman
check: command -v watchman
versionCmd: watchman --version 2>/dev/null

dependencies:
  - Homebrew

detail: |
  ## 什么是 watchman

  watchman 是 Facebook 开源的文件系统监控服务，能够高效地监视文件和目录的变更，并在变化发生时触发相应的操作。它比传统的 inotify/fsevents 方案更高效，适合大型项目的文件监控需求。

  ## 核心功能

  - **高效监控**：使用操作系统原生 API 高效监控大量文件变更
  - **递归监视**：支持递归监视整个目录树，自动跟踪新增文件
  - **触发器机制**：文件变更时自动触发自定义命令或脚本
  - **订阅模式**：支持长连接订阅，实时接收文件变更通知
  - **去重合并**：智能合并短时间内的多次变更，避免重复触发
  - **状态持久化**：支持保存和查询文件变更的游标状态

  ## 常用命令

  ```bash
  watchman watch ~/projects/myapp  # 开始监视目录
  watchman watch-list              # 列出所有被监视的目录
  watchman since /path trigger-name  # 查询自上次以来的变更
  watchman trigger ~/project -- name trigger-name -- bash build.sh  # 设置触发器
  watchman watch-del ~/projects/myapp  # 停止监视目录
  watchman shutdown-server        # 关闭 watchman 服务
  watchman log                    # 查看日志
  ```

detail_en: |
  ## What is watchman

  watchman is an open-source file system monitoring service from Facebook that efficiently watches files and directories for changes and triggers corresponding actions when changes occur. It is more efficient than traditional inotify/fsevents solutions, making it suitable for large-scale project file monitoring needs.

  ## Key Features

  - **Efficient monitoring**: Uses OS-native APIs to efficiently monitor large numbers of file changes
  - **Recursive watching**: Supports recursive watching of entire directory trees, automatically tracking new files
  - **Trigger mechanism**: Automatically trigger custom commands or scripts on file changes
  - **Subscription mode**: Supports long-lived subscriptions for real-time file change notifications
  - **Deduplication**: Intelligently merges multiple changes within short time windows to avoid duplicate triggers
  - **State persistence**: Supports saving and querying cursor states for file changes

  ## Common Commands

  ```bash
  watchman watch ~/projects/myapp  # Start watching a directory
  watchman watch-list              # List all watched directories
  watchman since /path trigger-name  # Query changes since last time
  watchman trigger ~/project -- name trigger-name -- bash build.sh  # Set up a trigger
  watchman watch-del ~/projects/myapp  # Stop watching a directory
  watchman shutdown-server        # Shut down the watchman service
  watchman log                    # View logs
  ```
