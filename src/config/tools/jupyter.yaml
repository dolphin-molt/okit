name: Jupyter
category: Data

description: 交互式数据分析和可视化笔记本环境，支持 Python、R 等语言
description_en: Interactive data analysis and visualization notebook environment supporting Python, R, and more
homepage: https://jupyter.org

install: pipx install --include-deps jupyter
upgrade: pipx upgrade --include-deps jupyter
uninstall: pipx uninstall jupyter
check: command -v jupyter

dependencies:
  - pipx

detail: |
  ## 什么是 Jupyter

  Jupyter 是一个开源的交互式计算平台，提供基于 Web 的笔记本环境，让数据分析、可视化和机器学习开发变得更加直观。它支持 Python、R、Julia 等 40 多种编程语言，是数据科学家和研究人员最常用的工具之一。

  ## 核心功能

  - **交互式笔记本**：代码、文档、可视化一体化，支持实时运行和编辑
  - **多语言内核**：通过不同内核支持 Python、R、Julia 等 40+ 编程语言
  - **丰富可视化**：内嵌 Matplotlib、Plotly 等图表库，直接展示数据可视化
  - **Markdown 支持**：用 Markdown 编写文档说明，代码和文档混排
  - **扩展生态**：丰富的扩展插件，支持代码格式化、变量检查器等
  - **协作分享**：支持导出为 HTML、PDF、LaTeX 等格式分享

  ## 常用命令

  ```bash
  jupyter notebook                  # 启动笔记本服务器
  jupyter lab                       # 启动 JupyterLab 环境
  jupyter nbconvert --to html notebook.ipynb  # 转换为 HTML
  jupyter nbconvert --to pdf notebook.ipynb   # 转换为 PDF
  jupyter kernelspec list           # 列出已安装的内核
  jupyter notebook list             # 列出运行中的笔记本服务器
  ```

detail_en: |
  ## What is Jupyter

  Jupyter is an open-source interactive computing platform that provides a web-based notebook environment, making data analysis, visualization, and machine learning development more intuitive. It supports over 40 programming languages including Python, R, and Julia, and is one of the most commonly used tools by data scientists and researchers.

  ## Key Features

  - **Interactive Notebooks**: Code, documentation, and visualization in one place with real-time execution and editing
  - **Multi-language Kernels**: Supports 40+ programming languages including Python, R, and Julia via different kernels
  - **Rich Visualization**: Embedded chart libraries like Matplotlib and Plotly for direct data visualization
  - **Markdown Support**: Write documentation with Markdown, mixing code and narrative text
  - **Extension Ecosystem**: Rich extension plugins for code formatting, variable inspectors, and more
  - **Collaboration and Sharing**: Export to HTML, PDF, LaTeX, and other formats for sharing

  ## Common Commands

  ```bash
  jupyter notebook                  # Start notebook server
  jupyter lab                       # Start JupyterLab environment
  jupyter nbconvert --to html notebook.ipynb  # Convert to HTML
  jupyter nbconvert --to pdf notebook.ipynb   # Convert to PDF
  jupyter kernelspec list           # List installed kernels
  jupyter notebook list             # List running notebook servers
  ```
