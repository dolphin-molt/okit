name: Cursor
category: AI Coding
type: app

description: AI 原生代码编辑器，基于 VS Code 深度集成 AI 编程能力
description_en: AI-native code editor based on VS Code with deeply integrated AI coding capabilities
homepage: https://cursor.com
downloadUrl: https://cursor.com

install:
  darwin: brew install --cask cursor
upgrade:
  darwin: brew upgrade --cask cursor
uninstall:
  darwin: bash -c 'brew uninstall --cask cursor 2>/dev/null; [ -d /Applications/Cursor.app ] && osascript -e "tell application \"Finder\" to delete POSIX file \"/Applications/Cursor.app\""'
check:
  darwin: test -d /Applications/Cursor.app

dependencies:
  - Homebrew

detail: |
  ## 什么是 Cursor

  Cursor 是一款 AI 原生代码编辑器，基于 VS Code 深度集成了 AI 编程能力。它支持智能代码补全、AI 对话、代码库理解等功能，是目前最受欢迎的 AI 编程工具之一。

  ## 核心功能

  - **AI 代码补全**：基于上下文的智能代码补全，支持多行生成
  - **AI 对话**：在编辑器内与 AI 对话，直接修改代码
  - **代码库理解**：AI 理解整个代码库的结构和依赖
  - **多模型支持**：支持 Claude、GPT-4 等多种 AI 模型
  - **VS Code 兼容**：完全兼容 VS Code 扩展和配置
  - **内联编辑**：AI 直接在代码中建议修改，一键接受或拒绝

  ## 常用快捷键

  ```
  Cmd+K          # AI 内联编辑
  Cmd+L          # 打开 AI 对话
  Cmd+I          # AI 代码补全
  Cmd+Shift+L    # 将代码添加到对话上下文
  @files         # 引用文件作为上下文
  @docs          # 引用文档作为上下文
  ```

  ## 使用方式

  Cursor 为桌面应用，安装后从启动台或应用程序文件夹打开即可使用。

detail_en: |
  ## What is Cursor

  Cursor is an AI-native code editor built on VS Code with deeply integrated AI coding capabilities. It supports smart code completion, AI chat, codebase understanding, and more, making it one of the most popular AI coding tools available.

  ## Key Features

  - **AI Code Completion**: Context-aware smart code completion with multi-line generation
  - **AI Chat**: Chat with AI directly in the editor to modify code
  - **Codebase Understanding**: AI understands the entire codebase structure and dependencies
  - **Multi-model Support**: Works with Claude, GPT-4, and other AI models
  - **VS Code Compatibility**: Fully compatible with VS Code extensions and settings
  - **Inline Editing**: AI suggests modifications directly in code, accept or reject with one click

  ## Common Shortcuts

  ```
  Cmd+K          # AI inline edit
  Cmd+L          # Open AI chat
  Cmd+I          # AI code completion
  Cmd+Shift+L    # Add code to chat context
  @files         # Reference files as context
  @docs          # Reference documentation as context
  ```

  ## Usage

  Cursor is a desktop application. After installation, open it from Launchpad or the Applications folder.
