name: Terraform
category: Cloud

description: 基础设施即代码工具，用声明式配置管理云资源和基础设施
description_en: Infrastructure as Code tool for managing cloud resources with declarative configuration
homepage: https://terraform.io

install:
  darwin: brew install hashicorp/tap/terraform
  linux: "curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg && echo 'deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main' | sudo tee /etc/apt/sources.list.d/hashicorp.list && sudo apt-get update && sudo apt-get install -y terraform"
upgrade:
  darwin: brew upgrade hashicorp/tap/terraform
  linux: sudo apt-get update && sudo apt-get install -y terraform
uninstall:
  darwin: brew uninstall terraform
  linux: sudo apt-get remove -y terraform
check: command -v terraform
versionCmd: "terraform --version 2>/dev/null | head -1"

dependencies:
  - Homebrew

detail: |
  ## 什么是 Terraform

  Terraform 是 HashiCorp 推出的基础设施即代码（IaC）工具，使用声明式的 HCL 语言定义云资源和基础设施。它支持 AWS、Azure、GCP 等数百种云服务商和平台，通过 `terraform apply` 一键创建和管理跨云基础设施。

  ## 核心功能

  - **声明式配置**：用 HCL 语言描述期望的基础设施状态，Terraform 自动规划变更
  - **多云支持**：统一管理 AWS、Azure、GCP、阿里云等多个云平台的资源
  - **状态管理**：通过 state 文件追踪资源状态，确保配置与实际一致
  - **执行计划**：`terraform plan` 在变更前预览所有操作，防止意外破坏
  - **模块化**：通过模块（Module）封装和复用基础设施配置
  - **依赖图**：自动解析资源依赖关系，按正确顺序创建和销毁资源

  ## 常用命令

  ```bash
  terraform init               # 初始化工作目录
  terraform plan               # 预览变更计划
  terraform apply              # 执行变更
  terraform destroy            # 销毁所有资源
  terraform state list         # 列出状态中的资源
  terraform output             # 查看输出值
  terraform import <resource> <id>  # 导入已有资源
  terraform fmt                # 格式化配置文件
  ```

detail_en: |
  ## What is Terraform

  Terraform is an Infrastructure as Code (IaC) tool by HashiCorp that uses the declarative HCL language to define cloud resources and infrastructure. It supports hundreds of cloud providers and platforms including AWS, Azure, and GCP, enabling one-click creation and management of cross-cloud infrastructure with `terraform apply`.

  ## Key Features

  - **Declarative configuration**: Describe desired infrastructure state in HCL; Terraform automatically plans changes
  - **Multi-cloud support**: Uniformly manage resources across AWS, Azure, GCP, Alibaba Cloud, and more
  - **State management**: Track resource state through state files, ensuring configuration matches reality
  - **Execution plans**: `terraform plan` previews all changes before applying, preventing accidental destruction
  - **Modularity**: Encapsulate and reuse infrastructure configurations through Modules
  - **Dependency graph**: Automatically resolve resource dependencies and create/destroy resources in the correct order

  ## Common Commands

  ```bash
  terraform init               # Initialize the working directory
  terraform plan               # Preview the change plan
  terraform apply              # Apply changes
  terraform destroy            # Destroy all resources
  terraform state list         # List resources in state
  terraform output             # View output values
  terraform import <resource> <id>  # Import existing resources
  terraform fmt                # Format configuration files
  ```
