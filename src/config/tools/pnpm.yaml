name: pnpm
category: Development

description: 高效、快速的 Node.js 包管理器，使用硬链接节省磁盘空间
description_en: Fast, efficient Node.js package manager using hard links to save disk space
homepage: https://pnpm.io

install:
  darwin: brew install pnpm
  linux: npm install -g pnpm
upgrade:
  darwin: brew upgrade pnpm
  linux: "npm update -g pnpm"
uninstall:
  darwin: brew uninstall pnpm
  linux: "npm uninstall -g pnpm"
check: command -v pnpm
versionCmd: pnpm --version

dependencies:
  - Homebrew

detail: |
  ## 什么是 pnpm

  pnpm 是一个高性能的 Node.js 包管理器，被誉为"快速的、节省磁盘空间的包管理器"。它通过硬链接和符号链接机制，在全局存储中只保留一份依赖副本，大幅减少磁盘占用和安装时间。

  ## 核心功能

  - **内容寻址存储**：依赖在全局 store 中只存一份，项目间通过硬链接共享
  - **严格模式**：默认创建非扁平的 node_modules，避免幽灵依赖问题
  - **极速安装**：比 npm 和 yarn 快 2-3 倍，尤其适合 monorepo 项目
  - **Monorepo 支持**：内置 workspace 支持，轻松管理多包项目
  - **兼容 npm**：支持 package.json 和 npm 生态，迁移成本低
  - **确定性安装**：通过 lockfile 保证团队安装结果一致

  ## 常用命令

  ```bash
  pnpm install               # 安装依赖
  pnpm add <package>         # 添加依赖
  pnpm remove <package>      # 移除依赖
  pnpm run <script>          # 运行脚本
  pnpm update                # 更新依赖
  pnpm list                  # 列出已安装依赖
  pnpm store prune           # 清理未引用的 store 内容
  pnpm -r install            # 在 monorepo 中递归安装
  ```

detail_en: |
  ## What is pnpm

  pnpm is a high-performance Node.js package manager, known as "the fast, disk-space efficient package manager." It uses hard links and symbolic links to keep only one copy of each dependency in a global store, significantly reducing disk usage and installation time.

  ## Key Features

  - **Content-addressable Storage**: Dependencies stored only once in a global store, shared across projects via hard links
  - **Strict Mode**: Creates non-flat node_modules by default, avoiding phantom dependency issues
  - **Blazing Fast**: 2-3x faster than npm and yarn, especially for monorepo projects
  - **Monorepo Support**: Built-in workspace support for easy multi-package project management
  - **npm Compatible**: Supports package.json and the npm ecosystem with low migration cost
  - **Deterministic Installs**: Ensures consistent install results across the team via lockfile

  ## Common Commands

  ```bash
  pnpm install               # Install dependencies
  pnpm add <package>         # Add a dependency
  pnpm remove <package>      # Remove a dependency
  pnpm run <script>          # Run a script
  pnpm update                # Update dependencies
  pnpm list                  # List installed dependencies
  pnpm store prune           # Clean unreferenced store contents
  pnpm -r install            # Recursively install in a monorepo
  ```
