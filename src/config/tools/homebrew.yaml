name: Homebrew
category: System

description: macOS 和 Linux 的包管理器，用于安装、更新和管理软件包
description_en: Package manager for macOS and Linux for installing, updating, and managing software packages
homepage: https://brew.sh

install:
  darwin: __DYNAMIC__
upgrade:
  darwin: brew update && brew upgrade
check:
  darwin: command -v brew
versionCmd:
  darwin: "brew --version | head -1"

detail: |
  ## 什么是 Homebrew

  Homebrew 是 macOS 和 Linux 上最流行的包管理器，让安装、更新和卸载软件变得简单高效。它通过 formula（配方）定义软件的安装方式，用户只需一行命令即可完成安装。

  ## 核心功能

  - **一键安装**：通过 `brew install <package>` 快速安装数千款开源软件和工具
  - **依赖管理**：自动解析和安装软件依赖，避免版本冲突
  - **Cask 支持**：通过 `brew install --cask` 安装 macOS 桌面应用（如 Chrome、VS Code）
  - **自动更新**：`brew update && brew upgrade` 一键更新所有已安装软件
  - **Tap 仓库**：支持第三方仓库扩展，丰富可用软件源
  - **国内镜像**：支持配置国内镜像源，加速下载

  ## 常用命令

  ```bash
  brew install <package>     # 安装软件包
  brew uninstall <package>   # 卸载软件包
  brew update                # 更新 Homebrew 自身和软件列表
  brew upgrade               # 升级所有已安装的软件包
  brew list                  # 列出已安装的软件包
  brew search <keyword>      # 搜索软件包
  brew info <package>        # 查看软件包详细信息
  brew cleanup               # 清理旧版本缓存
  ```

detail_en: |
  ## What is Homebrew

  Homebrew is the most popular package manager for macOS and Linux, making it simple and efficient to install, update, and uninstall software. It uses formulas (recipes) to define how software is installed, allowing users to complete installations with a single command.

  ## Key Features

  - **One-Click Install**: Quickly install thousands of open-source software and tools via `brew install <package>`
  - **Dependency Management**: Automatically resolves and installs software dependencies, avoiding version conflicts
  - **Cask Support**: Install macOS desktop applications (e.g., Chrome, VS Code) via `brew install --cask`
  - **Auto Update**: Update all installed software with `brew update && brew upgrade`
  - **Tap Repositories**: Supports third-party repository extensions to enrich available software sources
  - **China Mirrors**: Supports configuring China mirror sources for faster downloads

  ## Common Commands

  ```bash
  brew install <package>     # Install a package
  brew uninstall <package>   # Uninstall a package
  brew update                # Update Homebrew itself and package lists
  brew upgrade               # Upgrade all installed packages
  brew list                  # List installed packages
  brew search <keyword>      # Search for packages
  brew info <package>        # View package details
  brew cleanup               # Clean up old version caches
  ```
