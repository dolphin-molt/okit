name: Docker Desktop
category: Containers
type: app

description: 容器化平台桌面版，用于打包、分发和运行应用程序及其依赖环境
description_en: Container platform desktop edition for packaging, distributing, and running applications with dependencies
homepage: https://docker.com
downloadUrl: https://www.docker.com/products/docker-desktop

install:
  darwin: "brew install --cask docker"
  linux: "curl -fsSL https://get.docker.com | sudo sh && sudo usermod -aG docker $USER"
upgrade:
  darwin: "brew upgrade --cask docker"
  linux: "sudo apt-get update && sudo apt-get install -y docker-ce docker-ce-cli containerd.io"
uninstall:
  darwin: "bash -c 'brew uninstall --cask docker 2>/dev/null; [ -d \"/Applications/Docker.app\" ] && osascript -e \"tell application \\\"Finder\\\" to delete POSIX file \\\"/Applications/Docker.app\\\"\"'"
  linux: "sudo apt-get remove -y docker-ce docker-ce-cli containerd.io"
check:
  darwin: test -d "/Applications/Docker.app"
  linux: command -v docker
versionCmd: docker --version 2>/dev/null

authCheck: "docker info 2>&1 | head -3"
authFix: docker login

dependencies:
  - Homebrew

detail: |
  ## 什么是 Docker

  Docker 是业界领先的容器化平台，通过将应用程序及其所有依赖打包到轻量级容器中，实现"一次构建，处处运行"。它解决了环境一致性问题，是现代 DevOps 和微服务架构的基石。

  ## 核心功能

  - **容器化运行**：将应用和依赖打包为容器，确保开发、测试、生产环境一致
  - **镜像管理**：通过 Dockerfile 构建可复用的镜像，支持分层缓存加速构建
  - **Docker Compose**：通过 YAML 配置一键启动多容器应用栈
  - **镜像仓库**：Docker Hub 提供海量公共镜像，支持私有仓库
  - **资源隔离**：基于 Linux 容器技术，轻量级隔离，性能接近原生
  - **跨平台**：支持 macOS、Linux、Windows，配合 Docker Desktop 使用

  ## 常用命令

  ```bash
  docker build -t <name> .   # 构建镜像
  docker run -p 8080:80 <image>  # 运行容器并映射端口
  docker ps                  # 查看运行中的容器
  docker stop <container>    # 停止容器
  docker rm <container>      # 删除容器
  docker images              # 列出本地镜像
  docker pull <image>        # 拉取远程镜像
  docker-compose up -d       # 启动 compose 应用栈
  ```

detail_en: |
  ## What is Docker

  Docker is the industry-leading containerization platform that packages applications and all their dependencies into lightweight containers, enabling "build once, run anywhere." It solves environment consistency problems and is the cornerstone of modern DevOps and microservice architectures.

  ## Key Features

  - **Containerized Runtime**: Package apps and dependencies into containers, ensuring consistency across development, testing, and production environments
  - **Image Management**: Build reusable images via Dockerfile with layered caching for faster builds
  - **Docker Compose**: Launch multi-container application stacks with a single YAML configuration
  - **Image Registry**: Docker Hub provides a vast collection of public images with private registry support
  - **Resource Isolation**: Lightweight isolation based on Linux container technology with near-native performance
  - **Cross-platform**: Supports macOS, Linux, and Windows via Docker Desktop

  ## Common Commands

  ```bash
  docker build -t <name> .   # Build image
  docker run -p 8080:80 <image>  # Run container with port mapping
  docker ps                  # List running containers
  docker stop <container>    # Stop container
  docker rm <container>      # Remove container
  docker images              # List local images
  docker pull <image>        # Pull remote image
  docker-compose up -d       # Start compose application stack
  ```
