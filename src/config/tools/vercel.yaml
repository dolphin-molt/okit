name: Vercel CLI
category: Cloud

description: Vercel 官方命令行工具，用于部署和管理前端项目
description_en: Official Vercel CLI for deploying and managing frontend projects
homepage: https://vercel.com/docs/cli

install: npm install -g vercel
upgrade: npm update -g vercel
uninstall: npm uninstall -g vercel
check: command -v vercel
versionCmd: vercel --version 2>/dev/null | head -1
authCheck: "vercel whoami 2>&1"
authFix: "vercel login"

dependencies:
  - Node.js

detail: |
  ## 什么是 Vercel CLI

  Vercel CLI 是 Vercel 平台的官方命令行工具，让开发者从终端完成前端项目的部署、预览和管理。它支持将 Next.js、React、Vue 等框架项目一键部署到 Vercel 的全球 CDN 边缘网络，并提供本地开发服务器模拟生产环境。

  ## 核心功能

  - **一键部署**：`vercel deploy` 将项目部署到 Vercel 全球 CDN，自动生成预览 URL
  - **本地开发**：`vercel dev` 在本地启动开发服务器，模拟 Vercel 生产环境
  - **环境变量管理**：安全地管理项目环境变量和 Secrets
  - **域名管理**：绑定自定义域名、配置 DNS 记录
  - **Serverless Functions**：本地开发和调试 Serverless API 函数
  - **项目协作**：支持多人协作项目的管理和部署权限控制

  ## 常用命令

  ```bash
  vercel                     # 部署项目（交互式）
  vercel --prod              # 部署到生产环境
  vercel dev                 # 启动本地开发服务器
  vercel env pull            # 拉取远程环境变量到本地
  vercel env add <name>      # 添加环境变量
  vercel domains add <domain> # 添加自定义域名
  vercel logs <url>          # 查看部署日志
  ```

detail_en: |
  ## What is Vercel CLI

  Vercel CLI is the official command-line tool for the Vercel platform, enabling developers to deploy, preview, and manage frontend projects from the terminal. It supports one-click deployment of Next.js, React, Vue, and other framework projects to Vercel's global CDN edge network, and provides a local development server that simulates the production environment.

  ## Key Features

  - **One-click deployment**: `vercel deploy` deploys projects to Vercel's global CDN with auto-generated preview URLs
  - **Local development**: `vercel dev` starts a local development server simulating the Vercel production environment
  - **Environment variables**: Securely manage project environment variables and secrets
  - **Domain management**: Bind custom domains and configure DNS records
  - **Serverless Functions**: Develop and debug serverless API functions locally
  - **Team collaboration**: Manage multi-person collaborative projects with deployment permission controls

  ## Common Commands

  ```bash
  vercel                     # Deploy project (interactive)
  vercel --prod              # Deploy to production
  vercel dev                 # Start local development server
  vercel env pull            # Pull remote environment variables locally
  vercel env add <name>      # Add an environment variable
  vercel domains add <domain> # Add a custom domain
  vercel logs <url>          # View deployment logs
  ```
