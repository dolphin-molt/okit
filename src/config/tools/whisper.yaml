name: Whisper
category: AI Coding

description: OpenAI 开源语音识别模型，支持多语言转录和翻译
description_en: OpenAI's open-source speech recognition model supporting multilingual transcription and translation
homepage: https://github.com/openai/whisper

install: pipx install openai-whisper
upgrade: pipx upgrade openai-whisper
uninstall: pipx uninstall openai-whisper
check: command -v whisper

dependencies:
  - pipx

detail: |
  ## 什么是 Whisper

  Whisper 是 OpenAI 开源的自动语音识别（ASR）系统，基于 68 万小时的多语言监督数据训练而成。它支持多语言语音转录、语音翻译、语言识别和语音活动检测，是目前最强大的开源语音识别模型之一。

  ## 核心功能

  - **多语言转录**：支持 99 种语言的语音转文字
  - **语音翻译**：将任意语言的语音翻译为英文文字
  - **语言检测**：自动识别音频中的语言
  - **多种模型**：从 tiny 到 large 五种模型，平衡速度和精度
  - **长音频处理**：支持自动分段处理长音频文件
  - **多格式支持**：支持 WAV、MP3、MP4 等常见音频格式

  ## 常用命令

  ```bash
  whisper audio.mp3                    # 转录音频文件
  whisper audio.mp3 --model medium     # 使用 medium 模型
  whisper audio.mp3 --language Chinese # 指定语言
  whisper audio.mp3 --output_format srt  # 输出 SRT 字幕格式
  whisper audio.mp3 --translate        # 翻译为英文
  whisper audio.mp3 --output_dir ./out  # 指定输出目录
  ```

detail_en: |
  ## What is Whisper

  Whisper is an open-source automatic speech recognition (ASR) system by OpenAI, trained on 680,000 hours of multilingual supervised data. It supports multilingual speech transcription, speech translation, language identification, and voice activity detection, and is one of the most powerful open-source speech recognition models available.

  ## Key Features

  - **Multilingual transcription**: Supports speech-to-text in 99 languages
  - **Speech translation**: Translate speech from any language into English text
  - **Language detection**: Automatically identify the language in audio
  - **Multiple models**: Five models from tiny to large, balancing speed and accuracy
  - **Long audio processing**: Supports automatic segmentation for long audio files
  - **Multi-format support**: Supports common audio formats including WAV, MP3, and MP4

  ## Common Commands

  ```bash
  whisper audio.mp3                    # Transcribe an audio file
  whisper audio.mp3 --model medium     # Use the medium model
  whisper audio.mp3 --language Chinese # Specify the language
  whisper audio.mp3 --output_format srt  # Output in SRT subtitle format
  whisper audio.mp3 --translate        # Translate to English
  whisper audio.mp3 --output_dir ./out  # Specify output directory
  ```
