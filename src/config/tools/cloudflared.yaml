name: cloudflared
category: Network

description: Cloudflare Tunnel 客户端，安全地将本地服务暴露到公网
description_en: Cloudflare Tunnel client for securely exposing local services to the internet
homepage: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks

install:
  darwin: brew install cloudflare/cloudflare/cloudflared
  linux: "curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb && sudo dpkg -i /tmp/cloudflared.deb && rm /tmp/cloudflared.deb"
upgrade:
  darwin: brew upgrade cloudflare/cloudflare/cloudflared
  linux: "curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb && sudo dpkg -i /tmp/cloudflared.deb && rm /tmp/cloudflared.deb"
uninstall:
  darwin: brew uninstall cloudflared
  linux: sudo apt-get remove -y cloudflared
check: command -v cloudflared
versionCmd: cloudflared --version 2>/dev/null

dependencies:
  - Homebrew

detail: |
  ## 什么是 cloudflared

  cloudflared 是 Cloudflare Tunnel 的官方客户端，用于建立从本地到 Cloudflare 全球网络的安全隧道。它无需开放公网端口即可将本地服务安全地暴露到互联网，适合开发调试、远程访问和零信任网络架构。

  ## 核心功能

  - **安全隧道**：通过 Cloudflare 全球网络建立加密隧道，无需暴露公网端口
  - **快速隧道**：`cloudflared tunnel --url localhost:3000` 无需登录即可创建临时隧道
  - **自定义域名**：将本地服务绑定到自有域名，支持 HTTPS 自动证书
  - **零信任访问**：配合 Cloudflare Zero Trust 实现安全的远程访问策略
  - **负载均衡**：支持多隧道负载均衡和高可用配置
  - **DNS 管理**：通过隧道自动管理 DNS 记录

  ## 常用命令

  ```bash
  cloudflared tunnel --url localhost:3000  # 创建快速临时隧道
  cloudflared tunnel create my-tunnel      # 创建命名隧道
  cloudflared tunnel route dns my-tunnel app.example.com  # 绑定域名
  cloudflared tunnel run my-tunnel         # 运行隧道
  cloudflared tunnel list                  # 列出所有隧道
  cloudflared access login                 # 登录 Cloudflare
  ```

detail_en: |
  ## What is cloudflared

  cloudflared is the official client for Cloudflare Tunnel, used to establish secure tunnels from your local machine to Cloudflare's global network. It allows you to securely expose local services to the internet without opening public ports, making it ideal for development debugging, remote access, and zero-trust network architectures.

  ## Key Features

  - **Secure Tunnels**: Establish encrypted tunnels through Cloudflare's global network, no need to expose public ports
  - **Quick Tunnels**: `cloudflared tunnel --url localhost:3000` creates a temporary tunnel without login
  - **Custom Domains**: Bind local services to your own domain with automatic HTTPS certificates
  - **Zero Trust Access**: Implement secure remote access policies with Cloudflare Zero Trust
  - **Load Balancing**: Support for multi-tunnel load balancing and high availability configurations
  - **DNS Management**: Automatically manage DNS records through tunnels

  ## Common Commands

  ```bash
  cloudflared tunnel --url localhost:3000  # Create a quick temporary tunnel
  cloudflared tunnel create my-tunnel      # Create a named tunnel
  cloudflared tunnel route dns my-tunnel app.example.com  # Bind domain
  cloudflared tunnel run my-tunnel         # Run tunnel
  cloudflared tunnel list                  # List all tunnels
  cloudflared access login                 # Log in to Cloudflare
  ```
