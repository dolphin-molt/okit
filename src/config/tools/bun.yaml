name: bun
category: Development

description: 高性能 JavaScript 运行时、包管理器和构建工具一体化方案
homepage: https://bun.sh

install: "curl -fsSL https://bun.sh/install | bash"
upgrade: "curl -fsSL https://bun.sh/install | bash"
uninstall: ~/.bun/uninstall.sh
check: command -v bun
versionCmd: bun --version

detail: |
  ## 什么是 Bun

  Bun 是一个基于 JavaScriptCore 引擎的高性能 JavaScript/TypeScript 运行时，集成了包管理器、构建工具和测试运行器。它用 Zig 语言编写，启动速度极快，是 Node.js 的现代替代方案。

  ## 核心功能

  - **极速运行时**：基于 JSC 引擎，启动速度和执行速度远超 Node.js
  - **内置打包器**：原生支持打包 JavaScript/TypeScript，无需额外配置
  - **包管理器**：`bun install` 比 npm 快数十倍，兼容 package.json
  - **原生 TypeScript**：无需配置即可直接运行 .ts 文件
  - **内置测试**：`bun test` 提供兼容 Jest 的测试框架
  - **Node.js 兼容**：兼容大部分 Node.js API 和 npm 生态

  ## 常用命令

  ```bash
  bun run app.ts             # 运行 TypeScript 文件
  bun install                # 安装依赖（极速）
  bun add <package>          # 添加依赖
  bun run <script>           # 运行 package.json 脚本
  bun test                   # 运行测试
  bun build ./src/index.ts --outdir ./dist  # 打包项目
  bun upgrade                # 升级 Bun 自身
  ```
